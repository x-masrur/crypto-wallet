<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CRYPT_ZEN</title>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@100;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.11.1/ethers.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --bg-main: #ffffff;
            --text-main: #000000;
            --glass: rgba(0, 0, 0, 0.03);
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-ui {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
        }

        .view { display: none; flex-direction: column; animation: fadeIn 0.4s ease; height: 100%; }
        .view.active { display: flex; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .btn-zen {
            border: 1px solid var(--border);
            padding: 14px;
            font-size: 9px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            transition: 0.3s;
            background: transparent;
            color: var(--text-main);
            cursor: pointer;
        }
        .btn-zen:hover { background: var(--text-main); color: var(--bg-main); }

        .input-zen {
            background: rgba(0,0,0,0.03);
            border: none;
            border-bottom: 1px solid var(--border);
            padding: 12px;
            color: var(--text-main);
            font-size: 11px;
            outline: none;
            width: 100%;
            text-align: center;
        }

        .zen-modal {
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
        }

        /* Drawer System */
        #drawer-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(5px);
            z-index: 40;
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #drawer-overlay.active { display: block; opacity: 1; }

        #drawer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70vh;
            z-index: 50;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            border-top: 1px solid var(--border);
            border-radius: 30px 30px 0 0;
        }
        #drawer.active { transform: translateY(0); }

        .net-option { padding: 15px; border: 1px solid var(--border); margin-bottom: 8px; font-size: 10px; cursor: pointer; }
        .net-option:hover { background: rgba(0,0,0,0.05); }

        #loading-overlay {
            position: absolute; inset: 0; background: var(--bg-main); z-index: 200;
            display: flex; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div class="w-full max-w-md relative">
        <div class="glass-ui p-8 h-[650px] flex flex-col relative overflow-hidden">
            
            <div id="loading-overlay">
                <div class="text-[8px] tracking-[1.2em] animate-pulse opacity-40">BOOTING_CORE...</div>
            </div>

            <div id="zen-alert" class="zen-modal text-center">
                <p id="alert-text" class="text-[10px] tracking-widest leading-loose mb-10 uppercase opacity-60"></p>
                <button class="btn-zen" onclick="closeZenAlert()">Dismiss</button>
            </div>

            <div id="logout-modal" class="zen-modal text-center">
                <h3 class="text-[10px] tracking-[0.5em] mb-4 text-red-500">LOGOUT?</h3>
                <p class="text-[8px] opacity-40 mb-10 uppercase">This clears local encrypted data.</p>
                <button class="btn-zen mb-3" onclick="confirmLogout()">Terminate_Session</button>
                <button class="btn-zen opacity-30 border-none" onclick="closeLogoutModal()">Cancel</button>
            </div>

            <div id="network-modal" class="zen-modal">
                <h3 class="text-[9px] tracking-[0.5em] mb-8 opacity-40 text-center">SELECT_NODE</h3>
                <div class="flex-1 overflow-y-auto" id="network-list"></div>
                <button class="btn-zen mt-6" onclick="closeNetworkModal()">Back</button>
            </div>

            <div class="flex justify-between items-center mb-10 opacity-40 text-[8px] tracking-[0.5em]">
                <div class="flex items-center gap-2">
                    <span class="w-1 h-1 bg-black rounded-full"></span>
                    <span id="status-text">LOCKED</span>
                </div>
                <span id="sys-time">00:00:00</span>
            </div>

            <div id="landing" class="view active">
                <div class="flex-1 flex flex-col justify-center items-center text-center">
                    <img src="https://drive.google.com/file/d/1JuMt6HRQb-Yy6H4SUqz2mwTjLAG9tKUo/view?usp=drivesdk" alt="Logo" class="w-16 h-16 mb-8 object-contain">
                    <h2 class="text-lg tracking-[0.6em] mb-2 uppercase">Zen_Vault</h2>
                </div>
                <div class="flex flex-col gap-3">
                    <button class="btn-zen" onclick="switchView('create-pass')">New_Vault</button>
                    <button class="btn-zen opacity-50" onclick="switchView('import')">Import</button>
                </div>
            </div>

            <div id="create-pass" class="view">
                <h2 class="text-[10px] tracking-widest mb-10 text-center opacity-50">SET_PASSCODE</h2>
                <input type="password" id="new-passcode" class="input-zen mb-10" placeholder="••••••••">
                <button class="btn-zen w-full mt-auto" onclick="startGeneration()">Generate</button>
            </div>

            <div id="lock-screen" class="view">
                <div class="flex-1 flex flex-col justify-center items-center">
                    <h2 class="text-[9px] tracking-[0.5em] mb-10 opacity-50">VAULT_LOCKED</h2>
                    <input type="password" id="unlock-passcode" class="input-zen mb-8 w-48" placeholder="PASSCODE">
                    <button class="btn-zen w-48" onclick="unlockVault()">Decrypt</button>
                </div>
            </div>

            <div id="backup" class="view">
                <h2 class="text-[10px] tracking-[0.4em] mb-6 opacity-50">SEED_PHRASE</h2>
                <div id="seed-display" class="bg-black/5 border border-dashed border-black/10 p-6 text-[10px] mb-8 text-center leading-loose"></div>
                <button class="btn-zen w-full mt-auto" onclick="finalizeVault()">Stored_Safely</button>
            </div>

            <div id="dashboard" class="view">
                <div class="flex justify-between items-center mb-12">
                    <div class="cursor-pointer" onclick="openNetworkModal()">
                        <p class="text-[7px] tracking-widest text-black/40 mb-1">NETWORK</p>
                        <span id="current-net-label" class="text-[10px] font-bold">ETHEREUM</span>
                    </div>
                    <button class="opacity-30 hover:opacity-100" onclick="openLogoutModal()">
                        <i class="fas fa-power-off text-xs"></i>
                    </button>
                </div>
                <div class="mb-12">
                    <p class="text-[9px] tracking-[0.6em] text-black/40 mb-4 uppercase">Balance</p>
                    <h1 class="text-5xl font-bold tracking-tighter mb-2" id="usd-balance">$0.00</h1>
                    <span class="text-[11px] text-black/50 tabular-nums" id="native-balance">0.0000</span>
                </div>
                <div class="bg-black/5 border border-black/10 p-4 mb-12">
                    <p class="text-[7px] text-black/40 mb-1">ID_HASH</p>
                    <p class="text-[9px] font-mono break-all opacity-60" id="addr-display">0x...</p>
                </div>
                <div class="grid grid-cols-2 gap-4 mt-auto">
                    <button class="btn-zen" onclick="openDrawer('receive')">Receive</button>
                    <button class="btn-zen" onclick="openDrawer('send')">Send</button>
                </div>
            </div>

            <div id="import" class="view">
                <h2 class="text-[10px] tracking-widest mb-8 opacity-50">IMPORT</h2>
                <textarea id="import-input" class="input-zen mb-4" rows="3" placeholder="SEED/KEY"></textarea>
                <input type="password" id="import-pass" class="input-zen mb-8" placeholder="PASSCODE">
                <button class="btn-zen w-full mt-auto" onclick="importWithPass()">Sync</button>
            </div>
        </div>
    </div>

    <div id="drawer-overlay" onclick="closeDrawer()"></div>
    <div id="drawer" class="glass-ui p-10 flex flex-col">
        <div class="w-10 h-1 bg-black/10 mx-auto mb-10 rounded-full" onclick="closeDrawer()"></div>
        
        <div id="drawer-receive" class="hidden text-center flex-1">
            <h3 class="text-[9px] tracking-[0.5em] mb-10 opacity-40 uppercase">Inbound_Address</h3>
            <div id="qrcode" class="inline-block p-4 bg-transparent border border-black/10 rounded-sm mb-10"></div>
            <p id="full-address" class="text-[8px] font-mono text-black/50 mb-10 break-all"></p>
            <div class="flex flex-col gap-3">
                <button class="btn-zen w-full" onclick="copyAddress()">Copy_Address</button>
                <button class="btn-zen w-full opacity-40 border-none" onclick="closeDrawer()">Return</button>
            </div>
        </div>

        <div id="drawer-send" class="hidden text-center flex-1">
            <h3 class="text-[9px] tracking-[0.5em] mb-10 opacity-40 uppercase">Outbound_Tx</h3>
             <input type="text" id="send-to" class="input-zen mb-4" placeholder="RECIPIENT_HASH">
             <input type="number" id="send-amount" class="input-zen mb-10" placeholder="0.00">
             <div class="flex flex-col gap-3">
                <button class="btn-zen w-full" onclick="closeDrawer()">Execute_Transfer</button>
                <button class="btn-zen w-full opacity-40 border-none" onclick="closeDrawer()">Cancel</button>
             </div>
        </div>
    </div>

    <script>
        const ALCHEMY = {
    eth: { rpc: "https://eth-mainnet.g.alchemy.com/v2/vgSuH_6qZPWuWoMxWjqxb", name: "ETHEREUM", sym: "ETH" },
    polygon: { rpc: "https://polygon-mainnet.g.alchemy.com/v2/vgSuH_6qZPWuWoMxWjqxb", name: "POLYGON", sym: "POL" },
    base: { rpc: "https://base-mainnet.g.alchemy.com/v2/vgSuH_6qZPWuWoMxWjqxb", name: "BASE_L2", sym: "ETH" },
    arb: { rpc: "https://arb-mainnet.g.alchemy.com/v2/vgSuH_6qZPWuWoMxWjqxb", name: "ARBITRUM_ONE", sym: "ETH" },
    opt: { rpc: "https://opt-mainnet.g.alchemy.com/v2/vgSuH_6qZPWuWoMxWjqxb", name: "OPTIMISM", sym: "ETH" },
    bnb: { rpc: "https://bnb-mainnet.g.alchemy.com/v2/vgSuH_6qZPWuWoMxWjqxb", name: "BNB_CHAIN", sym: "BNB" },
    monad: { rpc: "https://monad-mainnet.g.alchemy.com/v2/vgSuH_6qZPWuWoMxWjqxb", name: "MONAD_TEST", sym: "MON" }
};

        let currentNet = "eth";
        let wallet = null;
        let provider = null;

        window.onload = () => {
            const encrypted = localStorage.getItem('zen_vault_v3');
            if (encrypted) switchView('lock-screen');
            else switchView('landing');
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 1000);
        };

        // --- DRAWER LOGIC ---
        function openDrawer(type) {
            document.getElementById('drawer-overlay').classList.add('active');
            document.getElementById('drawer').classList.add('active');
            document.getElementById('drawer-receive').classList.add('hidden');
            document.getElementById('drawer-send').classList.add('hidden');
            document.getElementById('drawer-' + type).classList.remove('hidden');
        }

        function closeDrawer() {
            document.getElementById('drawer-overlay').classList.remove('active');
            document.getElementById('drawer').classList.remove('active');
        }

        // --- CORE FUNCTIONS ---
        function encryptAndSave(key, pass) {
            const cipher = CryptoJS.AES.encrypt(key, pass).toString();
            localStorage.setItem('zen_vault_v3', cipher);
        }

        function unlockVault() {
            const pass = document.getElementById('unlock-passcode').value;
            const encrypted = localStorage.getItem('zen_vault_v3');
            try {
                const bytes = CryptoJS.AES.decrypt(encrypted, pass);
                const originalKey = bytes.toString(CryptoJS.enc.Utf8);
                if (!originalKey) throw new Error();
                wallet = new ethers.Wallet(originalKey);
                updateDashboard(false);
            } catch (e) { showZenAlert("INVALID_PASSCODE"); }
        }

        function showZenAlert(msg) { 
            document.getElementById('alert-text').innerText = msg;
            document.getElementById('zen-alert').style.display = 'flex'; 
        }
        function closeZenAlert() { document.getElementById('zen-alert').style.display = 'none'; }
        function openLogoutModal() { document.getElementById('logout-modal').style.display = 'flex'; }
        function closeLogoutModal() { document.getElementById('logout-modal').style.display = 'none'; }
        
        function confirmLogout() {
            localStorage.clear();
            location.reload();
        }

        function openNetworkModal() {
            const list = document.getElementById('network-list');
            list.innerHTML = "";
            Object.keys(ALCHEMY).forEach(k => {
                const d = document.createElement('div');
                d.className = "net-option"; d.innerText = ALCHEMY[k].name;
                d.onclick = () => { 
                    currentNet = k; 
                    provider = new ethers.JsonRpcProvider(ALCHEMY[k].rpc);
                    document.getElementById('current-net-label').innerText = ALCHEMY[k].name;
                    closeNetworkModal(); refreshBalance();
                };
                list.appendChild(d);
            });
            document.getElementById('network-modal').style.display = 'flex';
        }
        function closeNetworkModal() { document.getElementById('network-modal').style.display = 'none'; }

        function startGeneration() {
            const pass = document.getElementById('new-passcode').value;
            if (pass.length < 4) return showZenAlert("PASSCODE_SHORT");
            wallet = ethers.Wallet.createRandom();
            document.getElementById('seed-display').innerText = wallet.mnemonic.phrase;
            switchView('backup');
        }

        function finalizeVault() {
            const pass = document.getElementById('new-passcode').value;
            encryptAndSave(wallet.privateKey, pass);
            updateDashboard(true);
        }

        function importWithPass() {
            const input = document.getElementById('import-input').value.trim();
            const pass = document.getElementById('import-pass').value;
            try {
                wallet = input.includes(' ') ? ethers.Wallet.fromPhrase(input) : new ethers.Wallet(input);
                encryptAndSave(wallet.privateKey, pass);
                updateDashboard(true);
            } catch(e) { showZenAlert("IMPORT_ERROR"); }
        }

        async function refreshBalance() {
            if (!wallet) return;
            provider = provider || new ethers.JsonRpcProvider(ALCHEMY[currentNet].rpc);
            try {
                const bal = await provider.getBalance(wallet.address);
                const fmt = ethers.formatEther(bal);
                document.getElementById('native-balance').innerText = `${parseFloat(fmt).toFixed(4)} ${ALCHEMY[currentNet].sym}`;
                document.getElementById('usd-balance').innerText = `$${(parseFloat(fmt) * 3500).toLocaleString()}`;
            } catch(e) { console.log(e); }
        }

        function updateDashboard(alertUser) {
            document.getElementById('status-text').innerText = "SYNCHRONIZED";
            document.getElementById('addr-display').innerText = wallet.address;
            document.getElementById('full-address').innerText = wallet.address;
            const qrBox = document.getElementById("qrcode");
            qrBox.innerHTML = ""; new QRCode(qrBox, { text: wallet.address, width: 140, height: 140 });
            switchView('dashboard'); refreshBalance();
            if(alertUser) showZenAlert("VAULT_SECURED");
        }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function copyAddress() { navigator.clipboard.writeText(wallet.address); showZenAlert("COPIED"); }
        setInterval(() => { document.getElementById('sys-time').innerText = new Date().toTimeString().split(' ')[0]; }, 1000);
    </script>
</body>
</html>
